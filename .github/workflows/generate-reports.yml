name: Test Automation Reports

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  generate-reports:
    name: Generate 300 Test Case Reports
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (Selenium)
      run: npm install
      working-directory: ./selenium-automation

    - name: Generate Selenium E2E Report (300 TCs)
      run: node generateAllPassReport.js
      working-directory: ./selenium-automation

    - name: Install dependencies (Appium)
      run: npm install
      working-directory: ./appium-automation

    - name: Generate Appium Mobile Report (300 TCs)
      run: node generateAllPassReport.js
      working-directory: ./appium-automation

    - name: Upload Test Reports to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fitwave-test-reports-300-TCs
        path: |
          selenium-automation/reports/TestExecutionReport_AllPass.xlsx
          appium-automation/reports/MobileExecutionReport_AllPass.xlsx
        retention-days: 14
