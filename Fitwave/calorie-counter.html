<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitwave — Smart Diet Tracking</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/diet.css"/>
</head>
<body>

  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="workout.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Workout</a>
    <a href="diet.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Nutrition</a>
    <a href="profile.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
  </nav>
  <div class="sidebar-bottom">
    <a href="#" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main-content">
  <!-- TOP NAV -->
  <header class="top-nav">
    <div class="nav-search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search foods, recipes..."/>
    </div>
    <div class="nav-actions">
      <button class="nav-icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
      <button class="nav-icon-btn" style="padding:0;overflow:hidden;border-radius:50%;">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display);color:#fff;" id="nav-avatar">U</div>
      </button>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="content-scroll">
    <div class="diet-header">
      <div>
        <div class="diet-title-sub">Search and log foods.</div>
        <h1 class="diet-title">🔥 Calorie Counter</h1>
      </div>
    </div>
    <div class="search-container" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1.5rem;">
      <div style="display: flex; gap: 1rem; background: var(--bg-card); padding: 1rem; border-radius: 16px; align-items: center; border: 1px solid rgba(255,255,255,0.05);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search for foods, brands, or restaurants..." style="flex: 1; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; font-family: var(--font-main);" />
        <button class="btn btn-primary btn-sm" style="border-radius: 8px;">Search</button>
      </div>

      <h3 style="font-size: 1.25rem; font-weight: 600; margin-top: 1rem;">Recent & Popular</h3>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
        <!-- Food Card 1 -->
        <div style="background: var(--bg-card); border-radius: 16px; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; border: 1px solid rgba(255,255,255,0.05);">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <h4 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem;">Avocado Toast</h4>
              <span style="color: var(--text-muted); font-size: 0.9rem;">1 slice (50g)</span>
            </div>
            <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent-green);">250 kcal</div>
          </div>
          <div style="display: flex; gap: 1rem; font-size: 0.85rem;">
            <span style="color: var(--accent-blue-2);">6g Protein</span>
            <span style="color: var(--accent-blue);">24g Carbs</span>
            <span style="color: var(--accent-pink);">15g Fats</span>
          </div>
          <button class="btn btn-glass" style="width: 100%; border-radius: 8px; margin-top: 0.5rem;" onclick="db.addFood('snacks', {name: 'Avocado Toast', calories: 250, protein: 6, carbs: 24, fats: 15}); alert('Added!');">
            + Log Food
          </button>
        </div>

        <!-- Food Card 2 -->
        <div style="background: var(--bg-card); border-radius: 16px; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; border: 1px solid rgba(255,255,255,0.05);">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <h4 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem;">Whey Protein Shake</h4>
              <span style="color: var(--text-muted); font-size: 0.9rem;">1 scoop (30g)</span>
            </div>
            <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent-green);">120 kcal</div>
          </div>
          <div style="display: flex; gap: 1rem; font-size: 0.85rem;">
            <span style="color: var(--accent-blue-2);">24g Protein</span>
            <span style="color: var(--accent-blue);">3g Carbs</span>
            <span style="color: var(--accent-pink);">1.5g Fats</span>
          </div>
          <button class="btn btn-glass" style="width: 100%; border-radius: 8px; margin-top: 0.5rem;" onclick="db.addFood('snacks', {name: 'Whey Shake', calories: 120, protein: 24, carbs: 3, fats: 1.5}); alert('Added!');">
            + Log Food
          </button>
        </div>
      </div>
    </div>
</div>
</main>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script src="js/db.js"></script>
<script src="js/diet.js"></script>
</body>
</html>
