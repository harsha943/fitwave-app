name: CI – Install Dependencies & Validate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-deps:
    name: Backend – Install & Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefer-offline || npm install

      - name: Verify backend entry point loads
        run: node -e "require('./index.js'); setTimeout(()=>process.exit(0),500);"
        env:
          PORT: 5000

  frontend-deps:
    name: Frontend – Install & Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefer-offline || npm install

      - name: Lint check
        run: npm run lint --if-present || true

      - name: Build frontend
        run: npm run build --if-present || true

  selenium-deps:
    name: Selenium Tests – Dependency Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend/selenium-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/frontend/selenium-tests/package-lock.json

      - name: Install Selenium test dependencies
        run: npm ci --prefer-offline || npm install

      - name: Verify test scripts are valid JS
        run: |
          node -c tests/auth.test.js
          node -c tests/dashboard.test.js
          node -c tests/diet.test.js
          node -c tests/workout.test.js
          node -c run-tests.js
          echo "All selenium test files are valid JavaScript."

  dast-deps:
    name: DAST Suite – Dependency Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend/automated_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify DAST test scripts are valid JS
        run: |
          node -c tests/cat1_authn_bypass.js
          node -c tests/cat2_authz_privesc.js
          node -c tests/cat3_idor.js
          node -c tests/cat4_rbac_matrix.js
          node -c tests/cat5_token_tampering.js
          node -c tests/cat6_injection.js
          node -c tests/cat7_rate_limit.js
          node -c runner.js
          node -c discover.js
          echo "All DAST test files are valid JavaScript."
