version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: fitwave-backend
    working_dir: /app
    volumes:
      - ./web/backend:/app
    ports:
      - "5000:5000"
    command: sh -c "npm install && node index.js"
    environment:
      - PORT=5000
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: fitwave-frontend
    working_dir: /app
    volumes:
      - ./web/frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://fitwave-backend:5000
    depends_on:
      - backend
    restart: unless-stopped
